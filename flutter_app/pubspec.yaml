name: vision_claw
description: VisionClaw - 视觉智能体移动端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # 网络请求
  dio: ^5.3.3
  web_socket_channel: ^2.4.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # 多媒体
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  record: ^5.0.4
  audioplayers: ^5.2.1
  
  # 权限
  permission_handler: ^11.0.1
  
  # 工具
  uuid: ^4.2.1
  intl: ^0.18.1
  provider: ^6.1.1
  get_it: ^7.6.4
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/audio/
